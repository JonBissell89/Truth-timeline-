<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truth Timeline</title>
    <link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>

    <!-- Login -->
    <div id="login-screen" class="screen active">
        <div class="login-wrap">
            <div class="login-glyph">⬡</div>
            <h1>Truth Timeline</h1>
            <p class="login-sub">Map your reality through conversation</p>

            <input id="username-input" type="text" placeholder="Your name"
                autocomplete="off" onkeydown="if(event.key==='Enter') document.getElementById('apikey-input').focus()" />

            <input id="apikey-input" type="password" placeholder="Anthropic API key  (sk-ant-…)"
                autocomplete="off" onkeydown="if(event.key==='Enter') login()" />

            <p class="login-privacy">
                Your key stays on your device and is only used to talk to Claude.
                <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Get a key →</a>
            </p>

            <button onclick="login()">Begin</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="app-screen" class="screen">

        <!-- View bar -->
        <div class="view-bar">
            <div class="view-tabs">
                <button class="view-tab active" data-view="mymind"    onclick="setView('mymind')">My Mind</button>
                <button class="view-tab"        data-view="community" onclick="setView('community')">Community</button>
                <button class="view-tab"        data-view="compare"   onclick="setView('compare')">Compare</button>
            </div>
            <div id="compare-wrap" class="compare-wrap hidden">
                <input id="compare-input" type="text" placeholder="Enter username…"
                    onkeydown="if(event.key==='Enter') loadCompare()" />
                <button onclick="loadCompare()">→</button>
            </div>
            <div id="user-tag" class="user-tag" onclick="confirmLogout()"></div>
        </div>

        <!-- Graph -->
        <div id="graph-area" class="graph-area">
            <canvas id="graph-canvas"></canvas>
            <div id="graph-empty" class="graph-empty hidden">
                <p>No nodes yet.</p>
                <p>Chat below to start.</p>
            </div>
            <div id="graph-info" class="graph-info"></div>
        </div>

        <!-- Bottom Panel -->
        <div class="bottom-panel">
            <div class="panel-header">
                <button class="panel-tab active" data-panel="chat" onclick="switchPanel('chat')">◎ Chat</button>
                <button class="panel-tab" data-panel="timeline" onclick="switchPanel('timeline')">◈ Timeline</button>
                <div class="ai-indicator">🟣 Claude</div>
            </div>

            <!-- Chat -->
            <div id="panel-chat" class="panel-content active">
                <div id="chat-messages" class="chat-messages">
                    <div class="chat-welcome">
                        <p>Ask anything — statements become nodes you can vote on.</p>
                        <div class="sample-prompts">
                            <button onclick="sendPrompt('Does free will exist?')">Does free will exist?</button>
                            <button onclick="sendPrompt('Is consciousness physical?')">Is consciousness physical?</button>
                            <button onclick="sendPrompt('Can AI be sentient?')">Can AI be sentient?</button>
                        </div>
                    </div>
                </div>
                <div class="chat-bar">
                    <input id="chat-input" type="text" placeholder="Ask anything…" autocomplete="off"
                        onkeydown="if(event.key==='Enter') sendMessage()" />
                    <button id="send-btn" onclick="sendMessage()">→</button>
                </div>
            </div>

            <!-- Timeline -->
            <div id="panel-timeline" class="panel-content">
                <div class="timeline-scroll">
                    <p class="panel-subtitle">Statements you voted TRUE</p>
                    <div id="timeline-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Node Modal -->
    <div id="node-modal" class="modal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-statement" id="modal-text"></div>
            <div class="modal-context"   id="modal-context"></div>
            <div class="modal-tally"     id="modal-tally"></div>
            <div class="vote-row">
                <button class="v-btn v-true"  onclick="castVote('yes')">TRUE</button>
                <button class="v-btn v-maybe" onclick="castVote('maybe')">PERHAPS</button>
                <button class="v-btn v-false" onclick="castVote('no')">FALSE</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=9"></script>
</body>
</html>
