<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Truth Timeline</title>
    <link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>

    <!-- Login -->
    <div id="login-screen" class="screen active">
        <div class="login-wrap">
            <div class="login-glyph">⬡</div>
            <h1>Truth Timeline</h1>
            <p class="login-sub">Map your reality through conversation</p>
            <input id="username-input" type="text" placeholder="Your name" autocomplete="off"
                onkeydown="if(event.key==='Enter') login()" />
            <button onclick="login()">Begin</button>
        </div>
    </div>

    <!-- Dashboard — single page, no tabs -->
    <div id="app-screen" class="screen">

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-chips" id="filter-chips">
                <button class="chip active" data-filter="all"     onclick="setFilter('all')">All</button>
                <button class="chip"        data-filter="true"    onclick="setFilter('true')">✓ True</button>
                <button class="chip"        data-filter="false"   onclick="setFilter('false')">✗ False</button>
                <button class="chip"        data-filter="perhaps" onclick="setFilter('perhaps')">≈ Perhaps</button>
                <button class="chip"        data-filter="hot"     onclick="setFilter('hot')">🔥 Hot</button>
            </div>
            <div id="user-tag" class="user-tag"></div>
        </div>

        <!-- Graph -->
        <div id="graph-area" class="graph-area">
            <canvas id="graph-canvas"></canvas>
            <div id="graph-empty" class="graph-empty hidden">
                <p>Graph is empty.</p>
                <p>Chat below to start.</p>
            </div>
            <div id="graph-info" class="graph-info"></div>
        </div>

        <!-- Bottom Panel: Chat + Timeline -->
        <div class="bottom-panel">

            <div class="panel-header">
                <button class="panel-tab active" data-panel="chat" onclick="switchPanel('chat')">
                    ◎ Chat
                </button>
                <button class="panel-tab" data-panel="timeline" onclick="switchPanel('timeline')">
                    ◈ Timeline
                </button>
                <div class="ai-indicator">🟣 Claude</div>
            </div>

            <!-- Chat -->
            <div id="panel-chat" class="panel-content active">
                <div id="chat-messages" class="chat-messages">
                    <div class="chat-welcome">
                        <p>Ask anything — AI statements become graph nodes.</p>
                        <div class="sample-prompts">
                            <button onclick="sendPrompt('Does consciousness exist?')">Does consciousness exist?</button>
                            <button onclick="sendPrompt('What is reality?')">What is reality?</button>
                            <button onclick="sendPrompt('Do I exist?')">Do I exist?</button>
                        </div>
                    </div>
                </div>
                <div class="chat-bar">
                    <input id="chat-input" type="text" placeholder="Ask anything…" autocomplete="off"
                        onkeydown="if(event.key==='Enter') sendMessage()" />
                    <button id="send-btn" onclick="sendMessage()">→</button>
                </div>
            </div>

            <!-- Timeline -->
            <div id="panel-timeline" class="panel-content">
                <div class="timeline-scroll">
                    <p class="panel-subtitle">Statements you voted TRUE</p>
                    <div id="timeline-list"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Node Modal -->
    <div id="node-modal" class="modal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-statement" id="modal-text"></div>
            <div class="modal-context"   id="modal-context"></div>
            <div class="modal-tally"     id="modal-tally"></div>
            <div class="vote-row">
                <button class="v-btn v-true"  onclick="castVote('yes')">TRUE</button>
                <button class="v-btn v-maybe" onclick="castVote('maybe')">PERHAPS</button>
                <button class="v-btn v-false" onclick="castVote('no')">FALSE</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js?v=8"></script>
</body>
</html>
